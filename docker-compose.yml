services:
  svmesh-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: svmesh-web
    ports:
      - "${NGINX_PORT:-8081}:8080"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx:rw,uid=1001,gid=1001,mode=1777
      - /var/run/nginx:rw,uid=1001,gid=1001,mode=1777
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
